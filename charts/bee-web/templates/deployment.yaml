apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "bee-web.name" . }}
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.pod.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "bee-web.name" . }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "bee-web.name" . }}
        ai.jobmatch.me/external-egress: {{ ternary "true" "false" .Values.pod.externalEgress | quote }}
    spec:
      {{- if .Values.image.pullSecretName }}
      imagePullSecrets:
        - name: {{ .Values.image.pullSecretName }}
      {{- end }}
      serviceAccountName: {{ include "bee-web.serviceAccountName" . }}
      securityContext:
        fsGroup: {{ .Values.pod.fsGroup }}
      containers:
        - name: {{ include "bee-web.containerName" . }}
          image: {{ printf "%s:%s" .Values.image.repository (.Values.image.tag | default .Chart.AppVersion) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: BEE_WEB_CONFIG
              value: {{ include "bee-web.configPath" . | quote }}
            {{- if .Values.config.history.bearerTokenSecretName }}
            - name: BEE_WEB_HISTORY_API_BEARER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.config.history.bearerTokenSecretName }}
                  key: {{ required "config.history.bearerTokenSecretKey is required when bearerTokenSecretName is set" .Values.config.history.bearerTokenSecretKey }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.container.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http
          readinessProbe:
            httpGet:
              path: /health
              port: http
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: {{ .Values.container.readOnlyRootFilesystem }}
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: config
              mountPath: {{ .Values.config.mountPath }}
              readOnly: true
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "bee-web.name" . }}
            items:
              - key: {{ .Values.config.fileName }}
                path: {{ .Values.config.fileName }}
